  <!-- smartwatch (mid-left area) -->
  <g transform="translate(18,168) rotate(-12,16,24)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- strap top (two parallel lines) -->
    <line x1="10" y1="0" x2="10" y2="8"/>
    <line x1="22" y1="0" x2="22" y2="8"/>
    <line x1="10" y1="0" x2="22" y2="0"/>
    <!-- watch body (rounded rect) -->
    <rect x="4" y="8" width="24" height="28" rx="5" ry="5"/>
    <!-- strap bottom -->
    <line x1="10" y1="36" x2="10" y2="46"/>
    <line x1="22" y1="36" x2="22" y2="46"/>
    <line x1="10" y1="46" x2="22" y2="46"/>
    <!-- strap buckle hole -->
    <circle cx="16" cy="42" r="1.5"/>
    <!-- screen: mini heart-rate pulse -->
    <polyline points="7,23 10,23 12,18 14,28 16,21 18,23 25,23"/>
    <!-- side crown button -->
    <path d="M28,16 L31,16 L31,20 L28,20" rx="1"/>
  </g>

  <!-- swimming / open water (bottom-right area) -->
  <g transform="translate(175,170) rotate(6,30,10)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- wave 1 -->
    <path d="M0,8 C6,2 12,14 18,8 C24,2 30,14 36,8 C42,2 48,14 54,8"/>
    <!-- wave 2 -->
    <path d="M0,16 C6,10 12,22 18,16 C24,10 30,22 36,16 C42,10 48,22 54,16"/>
  </g>

  <!-- mountain / MTB terrain (bottom-centre) -->
  <g transform="translate(90,160) rotate(12,34,28)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- left large peak -->
    <polyline points="0,48 24,4 48,48"/>
    <!-- right smaller peak overlapping -->
    <polyline points="32,48 50,20 68,48"/>
    <!-- snow cap on large peak -->
    <polyline points="18,20 24,4 30,20"/>
  </g>
</svg>
