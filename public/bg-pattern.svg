<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <!-- bicycle top-left -->
  <g transform="translate(10,16) rotate(-8,28,22)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- wheels -->
    <circle cx="16" cy="22" r="9"/>
    <circle cx="46" cy="22" r="9"/>
    <!-- frame: rear-axle → bottom-bracket → seat-tube-top → head-tube-top → front-axle -->
    <polyline points="16,22 28,22 28,10 40,10 46,22"/>
    <!-- seat stay: seat-tube-top → rear-axle -->
    <line x1="28" y1="10" x2="16" y2="22"/>
    <!-- down tube: bottom-bracket → head-tube-top -->
    <line x1="28" y1="22" x2="40" y2="10"/>
    <!-- seat post + saddle -->
    <line x1="28" y1="10" x2="28" y2="4"/>
    <line x1="24" y1="4" x2="32" y2="4"/>
    <!-- handlebar stem + bar (at head tube) -->
    <line x1="40" y1="10" x2="40" y2="4"/>
    <line x1="37" y1="4" x2="43" y2="4"/>
  </g>

  <!-- route squiggle with waypoints top-right -->
  <g transform="translate(92,12) rotate(12,30,14)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round">
    <path d="M0,18 C8,4 22,30 32,14 C42,0 52,22 60,10"/>
    <circle cx="0" cy="18" r="2.5" fill="#FC4C02"/>
    <circle cx="60" cy="10" r="2.5" fill="#FC4C02"/>
  </g>

  <!-- heart-rate / activity pulse centre -->
  <g transform="translate(50,70) rotate(-6,22,12)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,12 12,12 16,2 20,22 24,6 28,12 44,12"/>
  </g>

  <!-- map pin bottom-right -->
  <g transform="translate(108,96) rotate(15,14,17)" opacity="0.35" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14,0 C7,0 1,6 1,13 C1,22 14,34 14,34 C14,34 27,22 27,13 C27,6 21,0 14,0 Z"/>
    <circle cx="14" cy="13" r="4.5"/>
  </g>

  <!-- strava logo bottom-left -->
  <g transform="translate(10,92) rotate(-18,18,28)" opacity="0.35" fill="#FC4C02" stroke="none">
    <g transform="scale(2)">
      <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066l-2.084 4.116z"/>
      <path d="M11.379 7.956l2.084 4.1h3.066L11.379 2 6.229 12.056h3.066l2.084-4.1z"/>
    </g>
  </g>

