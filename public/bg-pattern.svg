<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160">
  <!-- bicycle top-left -->
  <g transform="translate(10,16) rotate(-8,28,22)" opacity="0.07" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="22" r="9"/>
    <circle cx="46" cy="22" r="9"/>
    <polyline points="10,22 20,10 30,10 37,22"/>
    <polyline points="30,10 46,22"/>
    <line x1="20" y1="10" x2="20" y2="4"/>
    <line x1="17" y1="4" x2="23" y2="4"/>
  </g>

  <!-- route squiggle with waypoints top-right -->
  <g transform="translate(92,12)" opacity="0.065" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round">
    <path d="M0,18 C8,4 22,30 32,14 C42,0 52,22 60,10"/>
    <circle cx="0" cy="18" r="2.5" fill="#FC4C02"/>
    <circle cx="60" cy="10" r="2.5" fill="#FC4C02"/>
  </g>

  <!-- heart-rate / activity pulse centre -->
  <g transform="translate(50,70)" opacity="0.06" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,12 12,12 16,2 20,22 24,6 28,12 44,12"/>
  </g>

  <!-- map pin bottom-right -->
  <g transform="translate(108,96)" opacity="0.065" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14,0 C7,0 1,6 1,13 C1,22 14,34 14,34 C14,34 27,22 27,13 C27,6 21,0 14,0 Z"/>
    <circle cx="14" cy="13" r="4.5"/>
  </g>

  <!-- zap / speed bolt bottom-left -->
  <g transform="translate(16,96)" opacity="0.06" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16,0 8,14 14,14 6,28"/>
  </g>
</svg>
